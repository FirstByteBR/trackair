<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rubik:wght@700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --clr-bg-start:   #0d0b2e;
    --clr-bg-mid:     #1a1aee;
    --clr-bg-end:     #00c8f0;
    --clr-text:       #ffffff;
    --clr-text-muted: rgba(255,255,255,0.65);
    --clr-accent:     #00d4ff;
    --clr-card-bg:    rgba(255,255,255,0.08);
    --clr-card-border:rgba(255,255,255,0.12);
    --clr-btn-bg:     rgba(255,255,255,0.15);
    --clr-btn-hover:  rgba(255,255,255,0.28);

    --clr-header-bg:  rgba(8,6,40,0.75);

    --font-body:    'Inter', system-ui, sans-serif;
    --font-display: 'Rubik', sans-serif;

    --max-w:    860px;
  }

  body {
    margin: 0;
    padding: 0;
    font-family: var(--font-body);
    color: var(--clr-text);
    background: linear-gradient(135deg,
        var(--clr-bg-start) 0%,
        var(--clr-bg-mid)   55%,
        var(--clr-bg-end)   100%);

    padding-top: var(--header-h);

  header {
    position: fixed; inset: 0 0 auto 0; height: var(--header-h);
    background: rgba(8,6,40,0.75); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 1000;
  }

  .header-logo { font-family: 'Rubik', sans-serif; font-weight: 900; font-size: 1.75rem; letter-spacing: -0.5px; }
  .header-logo .dot { color: var(--clr-accent); }
  .nav-card { display: flex; align-items: center; gap: 10px; }
  .nav-link { 
    background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.2); 
    padding: 9px 14px; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 0.95rem;
    transition: background 0.2s;
  }
  .nav-link:hover { background: rgba(255,255,255,0.30); }

  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    padding: 36px 20px;
  }

  .card {
    width: 100%;
    max-width: 860px;
    background: var(--clr-card-bg);
    border: 1px solid var(--clr-card-border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    padding: 32px 36px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    text-align: center;
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  }

  canvas {
    width: 100%;
    height: 350px;
  }

  footer {
    text-align: center;
    font-size: 0.8rem;
    color: var(--clr-text-muted);
    margin-bottom: 20px;
  }
</style>
</head>
<body>
  <header>
    <div class="header-logo">Track<span class="dot">.</span>air</div>
    <div class="nav-card">
      <a class="nav-link" href="index.html">Home</a>
      <a class="nav-link" href="live-ic.html">Live</a>
      <a class="nav-link" href="3d-info.html">3D</a>
      <a class="nav-link" href="comparativo.html">Comparativo</a>
    </div>
  </header>

  <main>
    <div class="card">
      <canvas id="chartTemp"></canvas>
    </div>
    <div class="card">
      <canvas id="chartCO2"></canvas>
    </div>
    <div class="card">
      <canvas id="chartPM25"></canvas>
    </div>
  </main>

  <footer>
    Atualização automática a cada 10s • Baseado em dados do sensor remoto
  </footer>

<script>
const ENDPOINT = "https://trackair-live.davimquerino2009.workers.dev";

function parseTXT(texto) {
    const blocos = texto.trim().split(/Cod:/).filter(Boolean);
    const dados = blocos.map(b => {
        const cod = b.match(/(\d+)/)?.[1] || null;
        const chave = b.match(/Chave:\s*(\S+)/)?.[1] || null;
        const data = b.match(/Data:\s*([0-9:\-\s]+)/)?.[1] || null;
        const dadoStr = b.match(/Dado:\s*(.+?)\s*Data:/s)?.[1]?.trim() || "";
        const dadosMedidos = {};
        dadoStr.split(";").forEach(par => {
            const [k, v] = par.split(":");
            if (k && v) dadosMedidos[k.trim()] = parseFloat(v);
        });
        return { Cod: cod, Chave: chave, Data: data, Dados: dadosMedidos };
    });
    return dados;
}

let charts = {};
let lastLabels = [];

function initCharts() {
  const ctxTemp = document.getElementById("chartTemp")?.getContext("2d");
  const ctxCO2 = document.getElementById("chartCO2")?.getContext("2d");
  const ctxPM25 = document.getElementById("chartPM25")?.getContext("2d");

  charts.temp = new Chart(ctxTemp, {
    type: "line",
    data: { 
      labels: [], 
      datasets: [{ 
        label: "Temperatura (°C)", 
        data: [],
        borderColor: "rgba(255, 99, 132, 1)",
        backgroundColor: "rgba(255, 99, 132, 0.1)",
        fill: true,
        pointRadius: 0, // Removido os pontos
        tension: 0.35,
        borderWidth: 2
      }] 
    },
    options: { 
      responsive: true,
      animation: false,
      plugins: {
        legend: {
          labels: { color: "#fff", font: { size: 14 } }
        }
      },
      scales: {
        x: {
          ticks: { 
            color: "#fff",
            maxTicksLimit: 6, // Limita número de timestamps
            callback: function(value, index, values) {
              // Mostra apenas alguns timestamps para não poluir
              if (index === 0 || index === values.length - 1 || index % Math.ceil(values.length / 5) === 0) {
                return this.getLabelForValue(value);
              }
              return '';
            }
          },
          grid: { color: "rgba(255,255,255,0.1)" }
        },
        y: {
          ticks: { color: "#fff" },
          grid: { color: "rgba(255,255,255,0.1)" },
          beginAtZero: false
        }
      }
    }
  });

  charts.co2 = new Chart(ctxCO2, {
    type: "line",
    data: { 
      labels: [], 
      datasets: [{ 
        label: "CO₂ (ppm)", 
        data: [],
        borderColor: "rgba(54, 162, 235, 1)",
        backgroundColor: "rgba(54, 162, 235, 0.1)",
        fill: true,
        pointRadius: 0, // Removido os pontos
        tension: 0.35,
        borderWidth: 2
      }] 
    },
    options: { 
      responsive: true,
      animation: false,
      plugins: {
        legend: {
          labels: { color: "#fff", font: { size: 14 } }
        }
      },
      scales: {
        x: {
          ticks: { 
            color: "#fff",
            maxTicksLimit: 6,
            callback: function(value, index, values) {
              if (index === 0 || index === values.length - 1 || index % Math.ceil(values.length / 5) === 0) {
                return this.getLabelForValue(value);
              }
              return '';
            }
          },
          grid: { color: "rgba(255,255,255,0.1)" }
        },
        y: {
          ticks: { color: "#fff" },
          grid: { color: "rgba(255,255,255,0.1)" },
          beginAtZero: false
        }
      }
    }
  });

  charts.pm25 = new Chart(ctxPM25, {
    type: "line",
    data: { 
      labels: [], 
      datasets: [{ 
        label: "PM2.5 (µg/m³)", 
        data: [],
        borderColor: "rgba(75, 192, 192, 1)",
        backgroundColor: "rgba(75, 192, 192, 0.1)",
        fill: true,
        pointRadius: 0, // Removido os pontos
        tension: 0.35,
        borderWidth: 2
      }] 
    },
    options: { 
      responsive: true,
      animation: false,
      plugins: {
        legend: {
          labels: { color: "#fff", font: { size: 14 } }
        }
      },
      scales: {
        x: {
          ticks: { 
            color: "#fff",
            maxTicksLimit: 6,
            callback: function(value, index, values) {
              if (index === 0 || index === values.length - 1 || index % Math.ceil(values.length / 5) === 0) {
                return this.getLabelForValue(value);
              }
              return '';
            }
          },
          grid: { color: "rgba(255,255,255,0.1)" }
        },
        y: {
          ticks: { color: "#fff" },
          grid: { color: "rgba(255,255,255,0.1)" },
          beginAtZero: false
        }
      }
    }
  });
}

function formatarTimestamp(dataString) {
  if (!dataString) return '';
  
  try {
    const date = new Date(dataString);
    // Formata como HH:MM (apenas hora e minuto)
    return date.toLocaleTimeString('pt-BR', { 
      hour: '2-digit', 
      minute: '2-digit'
    });
  } catch (e) {
    return dataString; // Fallback para o formato original se der erro
  }
}

function atualizarPlot(dados) {
  if (!charts.temp || !charts.co2 || !charts.pm25) {
    console.warn("atualizarPlot: objetos charts não inicializados");
    return;
  }

  // Usar timestamps formatados (apenas hora e minuto)
  const labels = dados.map(item => formatarTimestamp(item.Data));
  
  // Extrair os dados corretamente
  const tempData = dados.map(item => {
    const dados = item.Dados || {};
    return dados.Temperatura || dados.temp || dados.TEMP || 0;
  });
  
  const co2Data = dados.map(item => {
    const dados = item.Dados || {};
    return dados.CO2 || dados.co2 || dados.CO2 || 0;
  });
  
  const pm25Data = dados.map(item => {
    const dados = item.Dados || {};
    return dados.PM25 || dados.pm25 || dados['PM2_5'] || dados.pm2_5 || 0;
  });

  console.log("Dados processados:", { tempData, co2Data, pm25Data, labels });

  // Atualizar apenas se os labels mudaram significativamente
  const shouldUpdateLabels = JSON.stringify(labels) !== JSON.stringify(lastLabels);
  
  if (shouldUpdateLabels) {
    charts.temp.data.labels = labels;
    charts.co2.data.labels = labels;
    charts.pm25.data.labels = labels;
    lastLabels = labels;
  }

  charts.temp.data.datasets[0].data = tempData;
  charts.co2.data.datasets[0].data = co2Data;
  charts.pm25.data.datasets[0].data = pm25Data;

  charts.temp.update('none');
  charts.co2.update('none');
  charts.pm25.update('none');
}

async function atualizarGraficos() {
  try {
    const resp = await fetch("https://trackair-live.davimquerino2009.workers.dev/");
    const texto = await resp.text();
    console.log("Resposta da API:", texto);
    
    const dadosParseados = parseTXT(texto);
    console.log("Dados parseados:", dadosParseados);
    
    atualizarPlot(dadosParseados);
  } catch (e) {
    console.error("Erro ao buscar dados:", e);
  }
}

// Inicialização garantida após DOM carregar
document.addEventListener("DOMContentLoaded", () => {
  initCharts();
  atualizarGraficos();
  setInterval(atualizarGraficos, 10000);
});
</script>
</body>
</html>
